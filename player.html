<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>OTTO MUSIC</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#000;
color:#fff;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.player{
text-align:center;
max-width:900px;
width:90%;
}

.logo{
font-size:52px;
font-weight:800;
margin-bottom:20px;
}

.nome{
font-size:28px;
font-weight:600;
margin-top:20px;
}

.status{
font-size:16px;
opacity:.8;
margin-top:10px;
}

.disco{
width:260px;
height:260px;
border-radius:50%;
margin:auto;
background:
radial-gradient(circle,#333 0%,#111 55%,#000 100%);
animation:gira 6s linear infinite;
}

.pause{
animation-play-state:paused;
}

@keyframes gira{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}


#unlockAudio{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:999999;
}

.boxUnlock{
text-align:center;
}

.boxUnlock h2{
font-size:32px;
margin-bottom:10px;
}

.boxUnlock p{
opacity:.8;
margin-bottom:20px;
}

.boxUnlock button{
border:none;
background:#00c853;
color:#fff;
padding:18px 35px;
font-size:20px;
font-weight:700;
border-radius:15px;
cursor:pointer;
}










 
</style>
</head>
<body>

<div class="player">

<div class="logo">
OTTO MUSIC
</div>

<div id="disco" class="disco"></div>

<div id="nome" class="nome">
Aguardando...
</div>

<div id="status" class="status">
Conectando...
</div>

<audio id="audio" autoplay></audio>

</div>

<script>

/* ==========================
SUPABASE
========================== */

const SUPABASE_URL = "https://dxkszikemntfusfyrzos.supabase.co";
const SUPABASE_KEY = "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed";

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

/* ==========================
ELEMENTOS
========================== */

const audio =
document.getElementById("audio");

const nome =
document.getElementById("nome");

const statusTxt =
document.getElementById("status");

const disco =
document.getElementById("disco");

let musicaAtual = null;
let audioLiberado = false;

async function liberarAudio(){

try{

audio.volume = 0;

audio.src =
"data:audio/mp3;base64,//uQxAAAAAAAAAAAAAAAAAAAAAA";

await audio.play();

audio.pause();

audio.volume = 1;

audioLiberado = true;

}catch(e){}

document
.getElementById("unlockAudio")
.style.display = "none";

sincronizar();

}
/* ==========================
SINCRONIZAR
========================== */

async function sincronizar(){

const { data, error } =
await supabaseClient
.from("player_estado")
.select(`
  *,
  playlist_musicas (
    id,
    nome,
    url
  )
`)
.eq("id",1)
.single();

if(error || !data) return;
if(!data.musica_id) return;

if(!data) return;

nome.innerHTML =
data.playlist_musicas.nome;

const inicio =
new Date(data.inicio).getTime();

const agora =
Date.now();

const segundos =
Math.floor(
(agora - inicio) / 1000
);
const tempo =
Math.max(0, segundos);
if(
musicaAtual !== data.playlist_musicas.url
){

musicaAtual =
data.playlist_musicas.url;

audio.src =
data.playlist_musicas.url;

audio.onloadedmetadata = ()=>{

audio.currentTime = segundos;

if(data.status === "playing"){

if(audioLiberado){
  audio.play().catch(()=>{});
}
.catch(()=>{});

}else{

audio.pause();

}

};

}

if(data.status === "playing"){

statusTxt.innerHTML =
"Transmitindo ao vivo";

disco.classList.remove("pause");

if(audioLiberado){
  audio.play().catch(()=>{});
}
.catch(()=>{});

}else{

statusTxt.innerHTML =
"Pausado";

audio.pause();

disco.classList.add("pause");

}

}

/* ==========================
REALTIME
========================== */

supabaseClient
.channel("radio-sync")
.on(
"postgres_changes",
{
event:"*",
schema:"public",
table:"player_estado"
},
()=>{
sincronizar();
}
)
.subscribe();

/* ==========================
AUTO RECUPERAÇÃO
========================== */

setInterval(
sincronizar,
10000
);

sincronizar();

</script>
<div id="unlockAudio">
  <div class="boxUnlock">
    <h2>🎵 OTTO MUSIC</h2>
    <p>Toque para liberar o áudio</p>
    <button onclick="liberarAudio()">
      ▶ INICIAR
    </button>
  </div>
</div>
</body>
</html>
